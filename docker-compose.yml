services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transferhelper-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transferhelper
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: transferhelper
      SPRING_DATASOURCE_PASSWORD: transferhelper
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-test-client}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-test-secret}
      APP_AUTH_JWT_SECRET: ${APP_AUTH_JWT_SECRET:-dev-change-me-dev-change-me-dev-change-me}
      APP_AUTH_SUCCESS_REDIRECT_URI: ${APP_AUTH_SUCCESS_REDIRECT_URI:-http://localhost:8081/auth/callback}
      APP_AUTH_ALLOWED_REDIRECT_URIS: ${APP_AUTH_ALLOWED_REDIRECT_URIS:-http://localhost:8081/auth/callback,http://localhost:19006/auth/callback,transferme://auth/callback}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:8081,http://localhost:19006,http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: transferhelper-postgres
    environment:
      POSTGRES_DB: transferhelper
      POSTGRES_USER: transferhelper
      POSTGRES_PASSWORD: transferhelper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transferhelper -d transferhelper"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
