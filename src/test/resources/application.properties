spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never

app.auth.jwt-secret=test-change-me-test-change-me-test-secret
app.auth.jwt-issuer=transferhelper-backend-test
app.auth.token-ttl-minutes=60
app.auth.success-redirect-uri=http://localhost:8081/auth/callback
app.auth.allowed-redirect-uris=http://localhost:8081/auth/callback,transferme://auth/callback

app.oauth.google.client-id=test-client
app.oauth.google.client-secret=test-secret

app.cors.allowed-origins=http://localhost:8081,http://localhost:19006,http://localhost:3000
