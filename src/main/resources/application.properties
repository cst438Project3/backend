spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:backenddb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}

app.oauth.google.client-id=${GOOGLE_CLIENT_ID:test-client}
app.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:test-secret}

app.auth.jwt-secret=${APP_AUTH_JWT_SECRET:dev-change-me-dev-change-me-dev-change-me}
app.auth.jwt-issuer=${APP_AUTH_JWT_ISSUER:transferhelper-backend}
app.auth.token-ttl-minutes=${APP_AUTH_TOKEN_TTL_MINUTES:1440}
app.auth.success-redirect-uri=${APP_AUTH_SUCCESS_REDIRECT_URI:http://localhost:8081/auth/callback}
app.auth.allowed-redirect-uris=${APP_AUTH_ALLOWED_REDIRECT_URIS:http://localhost:8081/auth/callback,http://localhost:19006/auth/callback,transferme://auth/callback}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006,http://localhost:3000}
